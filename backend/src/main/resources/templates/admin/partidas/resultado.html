<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resultado - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f0f2f5}.sidebar{min-height:100vh;background:#1a472a}.sidebar .nav-link{color:rgba(255,255,255,.75);border-radius:8px;margin:2px 8px}.sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15)}.placar-input{width:80px;text-align:center;font-size:2rem;font-weight:bold}</style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-auto col-md-3 col-xl-2 px-0">
        <div class="d-flex flex-column p-3 h-100">
            <a href="/admin/dashboard" class="d-flex align-items-center mb-4 text-decoration-none">
                <i class="bi bi-trophy-fill me-2" style="color:#ffd700;font-size:1.5rem"></i>
                <span class="fw-bold" style="color:#ffd700">Bolão Copa 2026</span>
            </a>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/admin/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="/admin/partidas" class="nav-link active"><i class="bi bi-calendar3 me-2"></i>Partidas</a></li>
                <li><a href="/admin/selecoes" class="nav-link"><i class="bi bi-flag me-2"></i>Seleções</a></li>
                <li><a href="/admin/usuarios" class="nav-link"><i class="bi bi-people me-2"></i>Usuários</a></li>
            </ul>
            <hr class="text-white-50">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="/admin/partidas" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0">Registrar Resultado</h4>
        </div>

        <div class="card border-0 shadow-sm rounded-3 p-4" style="max-width:500px">
            <!-- Info da partida -->
            <div class="text-center mb-4">
                <p class="text-muted small mb-1" th:text="${partida.fase + ' · ' + #temporals.format(partida.dataHora, 'dd/MM/yyyy HH:mm')}"></p>
                <div class="d-flex align-items-center justify-content-center gap-3">
                    <span class="fs-5 fw-bold" th:text="${partida.selecaoCasa.nome}"></span>
                    <span class="badge bg-secondary">VS</span>
                    <span class="fs-5 fw-bold" th:text="${partida.selecaoFora.nome}"></span>
                </div>
            </div>

            <form th:action="@{/admin/partidas/{id}/resultado(id=${partida.id})}" th:object="${resultado}" method="post">
                <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
                    <div class="text-center">
                        <label class="form-label small fw-semibold" th:text="${partida.selecaoCasa.sigla}"></label>
                        <input type="number" th:field="*{golsCasa}" class="form-control placar-input" min="0" max="99" required placeholder="0">
                    </div>
                    <span class="fs-3 fw-bold text-muted mt-3">×</span>
                    <div class="text-center">
                        <label class="form-label small fw-semibold" th:text="${partida.selecaoFora.sigla}"></label>
                        <input type="number" th:field="*{golsFora}" class="form-control placar-input" min="0" max="99" required placeholder="0">
                    </div>
                </div>

                <div class="alert alert-warning py-2 small">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Ao salvar, a partida será automaticamente marcada como <strong>Finalizada</strong>.
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Confirmar Resultado</button>
                    <a href="/admin/partidas" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
