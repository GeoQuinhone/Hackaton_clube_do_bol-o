<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova Partida - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f0f2f5}.sidebar{min-height:100vh;background:#1a472a}.sidebar .nav-link{color:rgba(255,255,255,.75);border-radius:8px;margin:2px 8px}.sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15)}</style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-auto col-md-3 col-xl-2 px-0">
        <div class="d-flex flex-column p-3 h-100">
            <a href="/admin/dashboard" class="d-flex align-items-center mb-4 text-decoration-none">
                <i class="bi bi-trophy-fill me-2" style="color:#ffd700;font-size:1.5rem"></i>
                <span class="fw-bold" style="color:#ffd700">Bolão Copa 2026</span>
            </a>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/admin/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="/admin/partidas" class="nav-link active"><i class="bi bi-calendar3 me-2"></i>Partidas</a></li>
                <li><a href="/admin/selecoes" class="nav-link"><i class="bi bi-flag me-2"></i>Seleções</a></li>
                <li><a href="/admin/usuarios" class="nav-link"><i class="bi bi-people me-2"></i>Usuários</a></li>
            </ul>
            <hr class="text-white-50">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="/admin/partidas" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
            <h4 class="fw-bold mb-0">Nova Partida</h4>
        </div>

        <div class="card border-0 shadow-sm rounded-3 p-4" style="max-width:600px">
            <form th:action="@{/admin/partidas/nova}" th:object="${partida}" method="post">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Seleção da Casa *</label>
                        <select th:field="*{selecaoCasaId}" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome + ' (' + s.sigla + ')'}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('selecaoCasaId')}" th:errors="*{selecaoCasaId}"></div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Seleção de Fora *</label>
                        <select th:field="*{selecaoForaId}" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option th:each="s : ${selecoes}" th:value="${s.id}" th:text="${s.nome + ' (' + s.sigla + ')'}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('selecaoForaId')}" th:errors="*{selecaoForaId}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Data e Hora *</label>
                        <input type="datetime-local" th:field="*{dataHora}" class="form-control" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('dataHora')}" th:errors="*{dataHora}"></div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Fase *</label>
                        <input type="text" th:field="*{fase}" class="form-control" placeholder="ex: Grupo A, Oitavas..." required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('fase')}" th:errors="*{fase}"></div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Estádio</label>
                        <input type="text" th:field="*{estadio}" class="form-control" placeholder="ex: MetLife Stadium">
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-success px-4"><i class="bi bi-check-lg me-1"></i>Salvar Partida</button>
                        <a href="/admin/partidas" class="btn btn-outline-secondary ms-2">Cancelar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
