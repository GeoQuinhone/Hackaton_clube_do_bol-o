<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%); min-height: 100vh; }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand-icon { font-size: 3rem; color: #ffd700; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <div class="brand-icon"><i class="bi bi-trophy-fill"></i></div>
                <h4 class="mt-2 fw-bold">Bolão Copa 2026</h4>
                <p class="text-muted small">Painel Administrativo</p>
            </div>

            <div th:if="${erro}" class="alert alert-danger py-2 small" th:text="${erro}"></div>
            <div th:if="${msg}" class="alert alert-success py-2 small" th:text="${msg}"></div>

            <form th:action="@{/admin-login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="username" class="form-control" placeholder="admin@bolao.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
