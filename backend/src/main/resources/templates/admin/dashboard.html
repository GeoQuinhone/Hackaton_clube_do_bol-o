<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Admin Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar { min-height: 100vh; background: #1a472a; }
        .sidebar .nav-link { color: rgba(255,255,255,0.75); border-radius: 8px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.15); }
        .sidebar .brand { color: #ffd700; font-size: 1.1rem; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar col-auto col-md-3 col-xl-2 px-0">
        <div class="d-flex flex-column p-3 h-100">
            <a href="/admin/dashboard" class="d-flex align-items-center mb-4 text-decoration-none">
                <i class="bi bi-trophy-fill me-2" style="color:#ffd700;font-size:1.5rem"></i>
                <span class="brand fw-bold">Bolão Copa 2026</span>
            </a>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/admin/dashboard" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="/admin/partidas" class="nav-link"><i class="bi bi-calendar3 me-2"></i>Partidas</a></li>
                <li><a href="/admin/selecoes" class="nav-link"><i class="bi bi-flag me-2"></i>Seleções</a></li>
                <li><a href="/admin/usuarios" class="nav-link"><i class="bi bi-people me-2"></i>Usuários</a></li>
            </ul>
            <hr class="text-white-50">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Sair
                </button>
            </form>
        </div>
    </div>

    <!-- Conteúdo -->
    <div class="flex-grow-1 p-4">
        <h4 class="fw-bold mb-1">Dashboard</h4>
        <p class="text-muted mb-4">Visão geral do Bolão Copa 2026</p>

        <!-- Cards de estatísticas -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-xl-3">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-people-fill"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalUsuarios}">0</div>
                            <div class="text-muted small">Total de Usuários</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-person-check-fill"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${stats.usuariosAtivos}">0</div>
                            <div class="text-muted small">Usuários Ativos</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-calendar3"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${stats.totalPartidas}">0</div>
                            <div class="text-muted small">Total de Partidas</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-xl-3">
                <div class="card stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle-fill"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" th:text="${stats.partidasFinalizadas}">0</div>
                            <div class="text-muted small">Finalizadas</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Partidas recentes -->
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0">Partidas Recentes</h6>
                <a href="/admin/partidas" class="btn btn-sm btn-outline-success">Ver todas</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Partida</th>
                                <th>Fase</th>
                                <th>Data</th>
                                <th>Resultado</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${partidasRecentes}">
                                <td class="ps-3 fw-semibold" th:text="${p.selecaoCasa.sigla + ' x ' + p.selecaoFora.sigla}"></td>
                                <td><span class="badge bg-secondary bg-opacity-10 text-secondary" th:text="${p.fase}"></span></td>
                                <td class="text-muted small" th:text="${#temporals.format(p.dataHora, 'dd/MM HH:mm')}"></td>
                                <td th:text="${p.golsCasa != null ? p.golsCasa + ' x ' + p.golsFora : '-'}"></td>
                                <td>
                                    <span th:class="${'badge ' + (p.status.name() == 'FINALIZADA' ? 'bg-success' : p.status.name() == 'EM_ANDAMENTO' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                          th:text="${p.status}"></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(partidasRecentes)}">
                                <td colspan="5" class="text-center text-muted py-3">Nenhuma partida cadastrada ainda.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
