<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuários - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f0f2f5}.sidebar{min-height:100vh;background:#1a472a}
        .sidebar .nav-link{color:rgba(255,255,255,.75);border-radius:8px;margin:2px 8px}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.15)}
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-auto col-md-3 col-xl-2 px-0">
        <div class="d-flex flex-column p-3 h-100">
            <a href="/admin/dashboard" class="d-flex align-items-center mb-4 text-decoration-none">
                <i class="bi bi-trophy-fill me-2" style="color:#ffd700;font-size:1.5rem"></i>
                <span class="fw-bold" style="color:#ffd700">Bolão Copa 2026</span>
            </a>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="/admin/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="/admin/partidas" class="nav-link"><i class="bi bi-calendar3 me-2"></i>Partidas</a></li>
                <li><a href="/admin/selecoes" class="nav-link"><i class="bi bi-flag me-2"></i>Seleções</a></li>
                <li><a href="/admin/usuarios" class="nav-link active"><i class="bi bi-people me-2"></i>Usuários</a></li>
            </ul>
            <hr class="text-white-50">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="fw-bold mb-0">Usuários</h4>
                <p class="text-muted small mb-0">Gerencie os participantes do bolão</p>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
            <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Busca -->
        <form method="get" action="/admin/usuarios" class="mb-3 d-flex gap-2">
            <input type="text" name="nome" class="form-control form-control-sm" placeholder="Buscar por nome..." th:value="${busca}" style="max-width:300px">
            <button class="btn btn-success btn-sm"><i class="bi bi-search"></i> Buscar</button>
            <a href="/admin/usuarios" class="btn btn-outline-secondary btn-sm">Limpar</a>
        </form>

        <!-- Tabela -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Status</th>
                        <th>Cadastro</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}" class="text-muted small"></td>
                        <td>
                            <div class="fw-semibold" th:text="${u.name}"></div>
                        </td>
                        <td th:text="${u.email}" class="small text-muted"></td>
                        <td>
                            <span th:if="${u.role.name() == 'ADMIN'}" class="badge bg-danger">ADMIN</span>
                            <span th:if="${u.role.name() == 'USER'}" class="badge bg-secondary">USER</span>
                        </td>
                        <td>
                            <span th:if="${u.active}" class="badge bg-success">Ativo</span>
                            <span th:unless="${u.active}" class="badge bg-warning text-dark">Bloqueado</span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></td>
                        <td class="text-center">
                            <form th:action="@{/admin/usuarios/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                <button type="submit"
                                        th:class="${u.active ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'}"
                                        th:title="${u.active ? 'Bloquear usuário' : 'Desbloquear usuário'}"
                                        th:if="${u.role.name() != 'ADMIN'}">
                                    <i th:class="${u.active ? 'bi bi-lock' : 'bi bi-unlock'}"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/usuarios/{id}/promover(id=${u.id})}" method="post" class="d-inline"
                                  th:if="${u.role.name() == 'USER'}">
                                <button type="submit" class="btn btn-info btn-sm" title="Promover a Admin"
                                        onclick="return confirm('Promover este usuário a ADMIN?')">
                                    <i class="bi bi-shield-check"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="7" class="text-center text-muted py-4">Nenhum usuário encontrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
